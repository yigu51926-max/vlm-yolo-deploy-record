services:
  mediamtx:
    image: local/mediamtx:1.18.2
    container_name: mediamtx
    network_mode: host
    restart: unless-stopped

  yolo-event:
    image: vlm-yolo-collab:0.1
    container_name: vlm-yolo-event
    network_mode: host
    working_dir: /workspace/project
    environment:
      YOLO_CONFIG_DIR: /tmp/Ultralytics
      OPENCV_FFMPEG_CAPTURE_OPTIONS: rtsp_transport;tcp
      YOLO_MODEL_PATH: /models/yolo26n.pt
      LLAMA_CLI_PATH: /opt/llama.cpp/build/bin/llama-cli
      QWEN_MODEL_PATH: /models/qwen/Qwen3VL-2B-Instruct-Q4_K_M.gguf
      QWEN_MMPROJ_PATH: /models/qwen/mmproj-Qwen3VL-2B-Instruct-F16.gguf
    volumes:
      - .:/workspace/project
      - ${YOLO_MODEL_DIR:-./models}:/models:ro
      - ${LLAMA_CPP_DIR:-./vendor/llama.cpp}:/opt/llama.cpp:ro
      - ${QWEN_MODEL_DIR:-./models/qwen}:/models/qwen:ro
    command: bash -lc "python scripts/yolo_qwen_event_json_demo.py"
    profiles:
      - event
